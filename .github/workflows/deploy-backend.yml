# 每次 push 到 production 分支时：构建后端镜像并部署到 Cloud Run
# 使用 Artifact Registry（避免 gcr.io 的 createOnPush 权限问题）
# 使用前：1) GitHub Secrets 添加 GCP_SA_KEY  2) GCP 里手动建好 Artifact Registry 仓库（见 PRODUCTION_CHECKLIST）
name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - production

env:
  GCP_PROJECT: ledgerlens-484819
  GCP_REGION: us-central1
  AR_REPO: ledgerlens-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set GCP Project
        run: gcloud config set project ${{ env.GCP_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build -f backend/Dockerfile -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:${{ github.sha }} .

      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ledgerlens-backend \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/backend:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated
