# 每次 push 到 production 分支时：构建后端镜像并部署到 Cloud Run
# 使用前：在 GitHub Repo → Settings → Secrets → Actions 里添加 GCP_SA_KEY（见下方说明）
name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - production

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set GCP Project
        run: gcloud config set project ledgerlens-484819

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker Image
        run: |
          docker build -t gcr.io/ledgerlens-484819/ledgerlens-backend:${{ github.sha }} ./backend

      - name: Push to GCR
        run: |
          docker push gcr.io/ledgerlens-484819/ledgerlens-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ledgerlens-backend \
            --image gcr.io/ledgerlens-484819/ledgerlens-backend:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated
